<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - VJ Semijoias</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/jpeg" href="images/logo.png">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-logo">
            <img src="images/logo.png" alt="VJ Semijoias" class="auth-logo-img">
            <div class="auth-logo-text">VJ</div>
            <div class="auth-logo-tagline">SEMIJOIAS</div>
        </div>
        
        <h2>Bem-vinda de volta</h2>
        <p>Entre na sua conta para continuar</p>
        
        <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>E-mail <span class="required">*</span></label>
                <input type="email" name="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha <span class="required">*</span></label>
                <input type="password" name="password" required placeholder="••••••">
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.5rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="checkbox"> Lembrar-me
                </label>
                <a href="#" style="color: var(--gold-dark); font-size: 0.9rem;">Esqueci a senha</a>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>
        
        <div class="auth-divider"><span>ou</span></div>
        
        <div style="display: flex; flex-direction: column; gap: 0.8rem; margin-top: 1.5rem;">
            <button onclick="alert('Login com Google em breve!')" style="padding: 0.85rem; border: 2px solid var(--gray-light); border-radius: 10px; font-size: 0.95rem; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 0.5rem; background: white;">
                <span style="color: #4285f4; font-weight: bold;">G</span> Continuar com Google
            </button>
            <button onclick="alert('Login com Facebook em breve!')" style="padding: 0.85rem; border: 2px solid var(--gray-light); border-radius: 10px; font-size: 0.95rem; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 0.5rem; background: white;">
                <span style="color: #1877f2; font-weight: bold;">f</span> Continuar com Facebook
            </button>
        </div>
        
        <div class="auth-footer">
            Não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
        </div>
        
        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="index.html" style="color: var(--gray); font-size: 0.9rem;">← Voltar para a loja</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
    <script src="js/offline.js"></script>
    <script>
        function handleLogin(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const email = formData.get('email');
            const password = formData.get('password');
            
            const result = Auth.login(email, password);
            
            if (result.success) {
                showToast(result.message, 'success');
                setTimeout(() => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect') || 'index.html';
                    window.location.href = redirect;
                }, 1000);
            } else {
                showToast(result.message, 'error', 'Erro no login');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (Auth.isLoggedIn()) {
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect') || 'index.html';
                showToast('Você já está logada!', 'info');
                setTimeout(() => window.location.href = redirect, 800);
            }
        });
    </script>
</body>
</html>
