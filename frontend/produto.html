<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto - VJ Semijoias</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/jpeg" href="images/logo.png">
    <script src="js/seo.js" defer></script>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <img src="images/logo.png" alt="VJ Semijoias" class="logo-img">
                <div class="logo-text"><span class="logo-vj">VJ</span><span class="logo-tagline">SEMIJOIAS</span></div>
            </a>
            <ul class="nav-menu">
                <li><a href="/">Início</a></li>
                <li><a href="/catalogo" class="active">Catálogo</a></li>
                <li><a href="/#categorias">Categorias</a></li>
                <li><a href="/#sobre">Sobre</a></li>
            </ul>
            <div class="nav-actions">
                <a href="/login" class="nav-icon" data-user-info><span>👤</span></a>
                <a href="/carrinho" class="nav-icon"><span>🛒</span><span class="cart-badge">0</span></a>
                <button class="hamburger"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <div class="offline-notice" id="offline-notice"></div>

    <main class="product-detail">
        <div class="breadcrumb" style="margin-bottom: 2rem; justify-content: flex-start;">
            <a href="/">Início</a>
            <span>›</span>
            <a href="/catalogo">Catálogo</a>
            <span>›</span>
            <span id="breadcrumb-product">Produto</span>
        </div>

        <div class="product-detail-grid product-detail-loading" id="product-content" aria-busy="true">
            <div class="product-gallery product-gallery-skeleton" aria-hidden="true">
                <div class="product-detail-image product-image-skeleton">
                    <div class="product-skeleton-glow"></div>
                </div>
            </div>
            <div class="product-detail-info product-info-skeleton" aria-hidden="true">
                <div class="product-skeleton-line short"></div>
                <div class="product-skeleton-line title"></div>
                <div class="product-skeleton-line price"></div>
                <div class="product-skeleton-line medium"></div>
                <div class="product-skeleton-block"></div>
                <div class="product-skeleton-line"></div>
                <div class="product-skeleton-line medium"></div>
                <div class="product-skeleton-actions">
                    <div></div>
                    <div></div>
                </div>
            </div>
        </div>

        <section style="margin-top: 5rem;">
            <div class="section-header" style="margin-bottom: 2rem;">
                <h2 class="section-title">Você também vai <span>amar</span></h2>
            </div>
            <div class="products-grid" id="related-products"></div>
        </section>
    </main>
    <!-- FOOTER -->
    <footer class="footer" data-public-footer data-public-footer-fields="data-store-location data-store-hours"></footer>

    <script src="js/api.js"></script>
    <script src="js/store-config.js"></script>
    <script src="js/products.js"></script>
    <script src="js/public-layout.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
    <script src="js/offline.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadProductsFromAPI();
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));
            const product = getProductById(productId);

            if (!product) {
                document.getElementById('product-content').innerHTML = `
                    <div style="text-align: center; padding: 4rem; grid-column: 1/-1;">
                        <h2>Produto não encontrado</h2>
                        <p style="margin: 1rem 0 2rem; color: var(--gray);">O produto que você procura não existe ou foi removido.</p>
                        <a href="/catalogo" class="btn btn-primary">Ver Catálogo</a>
                    </div>`;
                return;
            }

            document.getElementById('breadcrumb-product').textContent = product.name;
            if (window.VJSEO?.applyProductSEO) {
                window.VJSEO.applyProductSEO(product);
            }
            window.productDetailCurrentProduct = product;

            const productImages = Array.isArray(product.images) && product.images.length
                ? product.images
                : (product.image ? [product.image] : []);
            const detailImage = productImages.length
                ? `
                    <img
                        id="product-main-image"
                        src="${productImages[0]}"
                        alt="${product.name}"
                        width="720"
                        height="720"
                        loading="eager"
                        fetchpriority="high"
                        decoding="async"
                        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
                    >
                    <div class="placeholder-large" style="display: none;">${product.icon || '💎'}</div>
                `
                : `<div class="placeholder-large">${product.icon || '💎'}</div>`;

            const galleryThumbnails = productImages.length > 1
                ? `
                    <div class="product-gallery-thumbnails">
                        ${productImages.map((image, index) => `
                            <button
                                type="button"
                                class="product-gallery-thumb ${index === 0 ? 'active' : ''}"
                                onclick="changeProductImage('${image}', this)"
                                aria-label="Ver foto ${index + 1} de ${product.name}"
                            >
                                <img src="${image}" alt="${product.name} - foto ${index + 1}" width="88" height="88" loading="lazy" decoding="async">
                            </button>
                        `).join('')}
                    </div>
                `
                : '';
            const badgeLabels = {
                new: 'NOVO',
                sale: 'OFERTA',
                bestseller: 'MAIS VENDIDO',
            };
            const badgeHTML = product.badge && badgeLabels[product.badge]
                ? `<span class="product-badge ${product.badge}" style="position: static; display: inline-block; margin-bottom: 1rem;">${badgeLabels[product.badge]}</span>`
                : '';
            const isOutOfStock = product.stock_status === 'out_of_stock';
            const stockHTML = isOutOfStock
                ? '<p class="stock-note unavailable detail">Produto sem estoque no momento</p>'
                : (product.stock_status === 'preorder' ? '<p class="stock-note preorder detail">Produto sob encomenda</p>' : '');

            const content = `
                <div class="product-gallery ${productImages.length > 1 ? 'has-thumbnails' : ''}">
                    ${galleryThumbnails}
                    <div class="product-detail-image">
                        ${detailImage}
                    </div>
                </div>
                <div class="product-detail-info">
                    <span class="product-category">${product.categoryName}</span>
                    <h1>${product.name}</h1>
                    ${badgeHTML}
                    <div class="product-price">${formatPrice(product.price)}</div>
                    <p class="product-installment">ou 12x de ${formatPrice(calculateInstallment(product.price))} sem juros</p>
                    ${stockHTML}

                    <div class="product-shipping-quote">
                        <div class="product-shipping-head">
                            <strong>Calcule o frete</strong>
                            <span>Informe seu CEP para ver as opcoes deste produto.</span>
                        </div>
                        <div class="product-shipping-form">
                            <input
                                type="text"
                                id="product-shipping-cep"
                                data-mask="cep"
                                inputmode="numeric"
                                maxlength="9"
                                placeholder="00000-000"
                                autocomplete="postal-code"
                                aria-label="CEP para calcular frete"
                            >
                            <button type="button" class="btn btn-secondary" id="product-shipping-submit" onclick="calculateProductShipping()">
                                Calcular
                            </button>
                        </div>
                        <div class="product-shipping-result" id="product-shipping-result">
                            Digite o CEP para consultar o frete sem ir ao carrinho.
                        </div>
                    </div>
                    
                    <p class="product-description">${product.description}</p>

                    <div class="product-trust-grid" aria-label="Informações de confiança da VJ Semijoias">
                        <div class="product-trust-item">
                            <strong>Garantia de 2 anos</strong>
                            <span>Cobertura para defeitos de fabricação, conforme nossa política de garantia.</span>
                        </div>
                        <div class="product-trust-item">
                            <strong>Banho Ouro 18K</strong>
                            <span>Peças selecionadas com acabamento de semijoia e cuidado na curadoria.</span>
                        </div>
                        <div class="product-trust-item">
                            <strong>Compra segura</strong>
                            <span>Pagamento em ambiente protegido e dados tratados com responsabilidade.</span>
                        </div>
                        <div class="product-trust-item">
                            <strong>Envio rápido</strong>
                            <span>Calcule o frete pelo CEP e acompanhe seu pedido depois da compra.</span>
                        </div>
                        <div class="product-trust-item">
                            <strong>Atendimento via WhatsApp</strong>
                            <span><a data-store-whatsapp-link>Fale com a loja em caso de dúvida antes da compra.</a></span>
                        </div>
                    </div>
                    
                    <div class="product-features">
                        <h4>✨ Características</h4>
                        <ul>
                            ${product.features.map(f => `<li>${f}</li>`).join('')}
                        </ul>
                    </div>
                    
                    <div class="quantity-selector">
                        <label>Quantidade:</label>
                        <div class="quantity-controls">
                            <button type="button" onclick="changeQuantity(-1)">−</button>
                            <input type="number" id="quantity" value="1" min="1" max="10">
                            <button type="button" onclick="changeQuantity(1)">+</button>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap;">
                        <button class="btn btn-primary" onclick="addProductToCart()" style="flex: 1; min-width: 200px;" ${isOutOfStock ? 'disabled' : ''}>
                            🛒 Adicionar ao Carrinho
                        </button>
                        <button class="btn btn-secondary" onclick="buyNow()" style="flex: 1; min-width: 200px;" ${isOutOfStock ? 'disabled' : ''}>
                            ⚡ Comprar Agora
                        </button>
                    </div>
                    
                    <div style="margin-top: 2rem; padding: 1rem; background: var(--cream); border-radius: 12px; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
                        <span style="font-size: 1.5rem;">🔒</span>
                        <div>
                            <strong>Compra 100% segura</strong>
                            <p style="font-size: 0.85rem; color: var(--gray); margin: 0;">Dados criptografados e protegidos</p>
                        </div>
                    </div>
                </div>
            `;

            const productContent = document.getElementById('product-content');
            productContent.classList.remove('product-detail-loading');
            productContent.removeAttribute('aria-busy');
            productContent.innerHTML = content;
            if (window.refreshPublicStoreConfig) {
                await window.refreshPublicStoreConfig();
            }
            setupProductShippingCalculator();

            const related = getAllProductsMerged()
                .filter(p => p.category === product.category && p.id !== product.id)
                .slice(0, 4);
            document.getElementById('related-products').innerHTML = related.map(p => createProductCard(p)).join('');
        });

        function changeProductImage(image, button) {
            const mainImage = document.getElementById('product-main-image');
            if (!mainImage) return;
            mainImage.src = image;
            mainImage.style.display = 'block';
            const fallback = mainImage.nextElementSibling;
            if (fallback) fallback.style.display = 'none';
            document.querySelectorAll('.product-gallery-thumb').forEach(item => {
                item.classList.remove('active');
            });
            button.classList.add('active');
        }

        function productDigitsOnly(value) {
            return String(value || '').replace(/\D/g, '');
        }

        function productEscapeText(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function productShippingOptionLabel(option) {
            const company = option.company || option.provider || '';
            const service = option.display_service || option.service || option.name || 'Frete';
            const label = company && !String(service).includes(company) ? `${company} - ${service}` : service;
            const estimatedDays = option.estimated_days || option.delivery_time || '';
            return estimatedDays ? `${label} - ${estimatedDays} dias uteis` : label;
        }

        function renderProductShippingOptions(options) {
            if (!Array.isArray(options) || options.length === 0) {
                return '<div class="product-shipping-empty">Nenhuma opcao de frete encontrada para este CEP.</div>';
            }

            return `
                <div class="product-shipping-options">
                    ${options.map(option => `
                        <div class="product-shipping-option">
                            <div>
                                <strong>${productEscapeText(productShippingOptionLabel(option))}</strong>
                                ${option.message ? `<span>${productEscapeText(option.message)}</span>` : ''}
                            </div>
                            <b>${Number(option.shipping || 0) === 0 ? 'Gratis' : formatPrice(Number(option.shipping || 0))}</b>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function setupProductShippingCalculator() {
            if (typeof applyInputMasks === 'function') {
                applyInputMasks();
            }

            const input = document.getElementById('product-shipping-cep');
            if (!input) return;

            input.addEventListener('keydown', event => {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    calculateProductShipping();
                }
            });

            input.addEventListener('input', () => {
                const result = document.getElementById('product-shipping-result');
                if (result && productDigitsOnly(input.value).length < 8) {
                    result.className = 'product-shipping-result';
                    result.textContent = 'Digite o CEP para consultar o frete sem ir ao carrinho.';
                }
            });
        }

        async function calculateProductShipping() {
            const product = window.productDetailCurrentProduct;
            const input = document.getElementById('product-shipping-cep');
            const result = document.getElementById('product-shipping-result');
            const button = document.getElementById('product-shipping-submit');
            if (!product || !input || !result) return;

            const cepDigits = productDigitsOnly(input.value);
            if (cepDigits.length !== 8) {
                result.className = 'product-shipping-result error';
                result.textContent = 'Informe um CEP valido com 8 digitos.';
                input.focus();
                return;
            }

            result.className = 'product-shipping-result loading';
            result.textContent = 'Calculando frete...';
            if (button) button.disabled = true;

            const quantity = Math.max(1, parseInt(document.getElementById('quantity')?.value || '1', 10) || 1);
            const shippingResult = await API.calculateShipping(
                Number(product.price || 0) * quantity,
                cepDigits,
                [{ id: product.id, quantity }]
            );

            if (button) button.disabled = false;

            if (!shippingResult.success) {
                result.className = 'product-shipping-result error';
                result.textContent = shippingResult.error || 'Nao foi possivel calcular o frete para este CEP.';
                return;
            }

            const options = Array.isArray(shippingResult.data.options) && shippingResult.data.options.length
                ? shippingResult.data.options
                : (shippingResult.data.selected_option ? [shippingResult.data.selected_option] : []);
            result.className = 'product-shipping-result success';
            result.innerHTML = renderProductShippingOptions(options);
        }

        function changeQuantity(delta) {
            const input = document.getElementById('quantity');
            let val = parseInt(input.value) + delta;
            if (val < 1) val = 1;
            if (val > 10) val = 10;
            input.value = val;
        }

        function addProductToCart() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));
            const quantity = parseInt(document.getElementById('quantity').value);
            const product = getProductById(productId);
            if (!product || product.stock_status === 'out_of_stock') {
                showToast('Produto sem estoque no momento', 'error');
                return;
            }

            Cart.add(productId, quantity);
            showToast(`${quantity}x ${product.name} adicionado ao carrinho!`, 'success');
        }

        function buyNow() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));
            const quantity = parseInt(document.getElementById('quantity').value);
            const product = getProductById(productId);
            if (!product || product.stock_status === 'out_of_stock') {
                showToast('Produto sem estoque no momento', 'error');
                return;
            }

            Cart.add(productId, quantity);
            window.location.href = '/carrinho';
        }
    </script>
</body>

</html>
