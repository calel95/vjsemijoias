<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - VJ Semijoias</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/jpeg" href="images/logo.png">
    <script src="js/seo.js" defer></script>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <img src="images/logo.png" alt="VJ Semijoias" class="logo-img">
                <div class="logo-text"><span class="logo-vj">VJ</span><span class="logo-tagline">SEMIJOIAS</span></div>
            </a>
            <ul class="nav-menu">
                <li><a href="/">Início</a></li>
                <li><a href="/catalogo">Catálogo</a></li>
                <li><a href="/#categorias">Categorias</a></li>
                <li><a href="/#sobre">Sobre</a></li>
            </ul>
            <div class="nav-actions">
                <a href="/login" class="nav-icon" data-user-info><span>👤</span></a>
                <a href="/carrinho" class="nav-icon" style="background: var(--gold-pale); color: var(--gold-dark);">
                    <span>🛒</span><span class="cart-badge">0</span>
                </a>
                <button class="hamburger"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <div class="offline-notice" id="offline-notice"></div>

    <main class="cart-page">
        <div style="text-align: center; margin-bottom: 1rem;">
            <h1 class="section-title" style="font-size: 2.5rem;">Meu <span
                    style="color: var(--gold-dark); font-style: italic;">Carrinho</span></h1>
            <p class="section-subtitle">Revise seus produtos antes de finalizar a compra</p>
        </div>

        <div id="cart-content"></div>
    </main>
    <!-- FOOTER -->
    <footer class="footer" data-public-footer data-public-footer-fields="data-store-location data-store-hours"></footer>

    <script src="js/api.js"></script>
    <script src="js/store-config.js"></script>
    <script src="js/products.js"></script>
    <script src="js/public-layout.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
    <script src="js/offline.js"></script>
    <script>
        let cartShippingLoading = false;
        let cartShippingError = '';

        function cartDigitsOnly(value) {
            return String(value || '').replace(/\D/g, '');
        }

        function cartEscapeText(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatCartCep(value) {
            const digits = cartDigitsOnly(value).slice(0, 8);
            return typeof maskCEP === 'function' ? maskCEP(digits) : digits.replace(/(\d{5})(\d)/, '$1-$2');
        }

        function cartShippingOptionLabel(option) {
            const company = option.company || option.provider || '';
            const service = option.display_service || option.service || 'Frete';
            return company && !String(service).includes(company) ? `${company} - ${service}` : service;
        }

        function cartShippingPriceLabel() {
            if (!Cart.pricing.shippingOption) return 'Calcule pelo CEP';
            const shipping = Cart.getShipping();
            return shipping === 0 ? 'Gratis' : formatPrice(shipping);
        }

        function renderCartShippingOptionsHTML() {
            if (cartShippingLoading) {
                return '<div class="cart-shipping-message">Calculando frete...</div>';
            }
            if (cartShippingError) {
                return `<div class="cart-shipping-message error">${cartEscapeText(cartShippingError)}</div>`;
            }

            const options = Cart.getShippingOptions();
            if (!options.length) {
                return '<div class="cart-shipping-message pending"><strong>Frete pendente</strong><span>Informe seu CEP, escolha uma opção de entrega e depois finalize a compra com segurança.</span></div>';
            }

            const selectedId = Cart.pricing.shippingOption?.id || '';
            return `
                ${!selectedId ? '<div class="cart-shipping-message pending"><strong>Escolha uma opção de frete</strong><span>Selecione uma entrega para liberar o checkout seguro.</span></div>' : ''}
                <div class="cart-shipping-options">
                    ${options.map(option => {
                        const selected = option.id === selectedId;
                        const estimated = option.estimated_days ? `${cartEscapeText(option.estimated_days)} dias uteis` : 'prazo a confirmar';
                        const price = Number(option.shipping || 0) === 0 ? 'Gratis' : formatPrice(Number(option.shipping || 0));
                        const message = option.message || `${cartShippingOptionLabel(option)}: ${price}`;
                        return `
                            <label class="cart-shipping-option ${selected ? 'selected' : ''}">
                                <input type="radio" name="cart_shipping_option" value="${cartEscapeText(option.id)}" ${selected ? 'checked' : ''} onchange="selectCartShippingOption(this.value)">
                                <span>
                                    <strong>${cartEscapeText(cartShippingOptionLabel(option))} - ${estimated}</strong>
                                    <small>${cartEscapeText(message)}</small>
                                </span>
                                <b>${price}</b>
                            </label>
                        `;
                    }).join('')}
                </div>
            `;
        }

        async function renderCart({ refreshPricing = true } = {}) {
            const container = document.getElementById('cart-content');

            if (Cart.items.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart empty-cart-commercial">
                        <div class="empty-cart-icon">Carrinho</div>
                        <h2>Seu carrinho ainda está vazio</h2>
                        <p>Explore nossas semijoias e encontre sua próxima peça favorita.</p>
                        <a href="/catalogo" class="btn btn-primary">Ver Catálogo</a>
                    </div>`;
                return;
            }

            if (refreshPricing) {
                await Cart.refreshPricing();
            }

            const itemsHTML = Cart.items.map(item => `
                <div class="cart-item">
                    <div class="cart-item-image">
                        ${item.image
                            ? `<img src="${item.image}" alt="${item.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                               <span class="cart-item-placeholder" style="display: none;">${item.icon || 'VJ'}</span>`
                            : `<span class="cart-item-placeholder">${item.icon || 'VJ'}</span>`}
                    </div>
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <p>${formatPrice(item.price)} cada</p>
                        <div class="quantity-selector" style="margin: 0.5rem 0;">
                            <div class="quantity-controls">
                                <button onclick="updateItemQty(${item.id}, ${item.quantity - 1})">-</button>
                                <input type="number" value="${item.quantity}" readonly>
                                <button onclick="updateItemQty(${item.id}, ${item.quantity + 1})">+</button>
                            </div>
                        </div>
                    </div>
                    <div class="cart-item-actions">
                        <div class="cart-item-price">${formatPrice(item.price * item.quantity)}</div>
                        <button class="cart-item-remove" onclick="removeItem(${item.id})">Remover</button>
                    </div>
                </div>
            `).join('');

            const discount = Cart.getDiscount();
            const total = Cart.getFinalTotal();
            const subtotal = Cart.getSubtotal();
            const couponCode = Cart.getCouponCode();
            const savedCep = formatCartCep(Cart.getShippingZipCode());

            container.innerHTML = `
                <div class="cart-grid">
                    <div class="cart-items cart-items-commercial">
                        <div class="cart-items-head">
                            <div>
                                <span>Produtos escolhidos</span>
                                <h3>Seu carrinho (${Cart.getCount()} ${Cart.getCount() === 1 ? 'item' : 'itens'})</h3>
                            </div>
                            <button class="cart-clear-button" onclick="clearCartConfirm()">
                                Limpar Carrinho
                            </button>
                        </div>
                        ${itemsHTML}
                        <a href="/catalogo" class="cart-continue-inline">Continuar comprando</a>
                    </div>
                    
                    <div class="cart-summary cart-summary-commercial">
                        <div class="cart-summary-head">
                            <span>Resumo seguro</span>
                            <h3>Resumo do Pedido</h3>
                            <p>${Cart.getCount()} ${Cart.getCount() === 1 ? 'item selecionado' : 'itens selecionados'}</p>
                        </div>
                        
                        <div class="summary-row summary-row-muted">
                            <span>Itens:</span>
                            <span>${Cart.getCount()}</span>
                        </div>
                        <div class="summary-row">
                            <span>Subtotal:</span>
                            <span>${formatPrice(subtotal)}</span>
                        </div>

                        <div class="cart-shipping-box cart-shipping-commercial">
                            <div class="cart-shipping-title">
                                <strong>Frete obrigatório antes do checkout</strong>
                                <span>Informe o CEP, escolha uma opção de entrega e siga para o checkout seguro.</span>
                            </div>
                            <div class="cart-shipping-form">
                                <input type="text" id="cart-shipping-cep" data-mask="cep" inputmode="numeric" maxlength="9" placeholder="00000-000" value="${cartEscapeText(savedCep)}" onkeydown="handleCartShippingCepKey(event)">
                                <button type="button" onclick="calculateCartShipping()" ${cartShippingLoading ? 'disabled' : ''}>${cartShippingLoading ? 'Calculando...' : 'Calcular'}</button>
                            </div>
                            <div id="cart-shipping-options">${renderCartShippingOptionsHTML()}</div>
                        </div>
                        
                        <div class="summary-row summary-row-shipping">
                            <span>Frete:</span>
                            <span>${cartShippingPriceLabel()}</span>
                        </div>
                        
                        ${discount > 0 ? `
                            <div class="summary-row summary-row-discount">
                                <span>Desconto (${couponCode}):</span>
                                <span>-${formatPrice(discount)}</span>
                            </div>
                        ` : ''}
                        
                        <div class="cart-coupon-box">
                            <label for="coupon-input">Cupom de desconto</label>
                            <p>Quando válido, o cupom será aplicado ao resumo do pedido.</p>
                            <div class="coupon-input">
                                <input type="text" id="coupon-input" placeholder="Digite seu cupom" value="${localStorage.getItem('vj_coupon') || ''}">
                                <button onclick="applyCoupon()">Aplicar</button>
                            </div>
                        </div>
                        
                        <div class="summary-row total cart-total-highlight">
                            <span>Total:</span>
                            <span class="price">${formatPrice(total)}</span>
                        </div>
                        
                        <div class="cart-shipping-selected-message">
                            ${Cart.getShippingMessage()}
                        </div>
                        
                        <a href="/checkout" class="btn btn-primary btn-block cart-checkout-button" onclick="goToCheckoutFromCart(event)">
                            Finalizar Compra com Segurança
                        </a>
                        
                        <a href="/catalogo" class="btn btn-secondary btn-block cart-continue-button">
                            Continuar Comprando
                        </a>
                        
                        <div class="cart-trust-panel" aria-label="Informações de confiança do carrinho">
                            <div><strong>Compra segura</strong><span>Checkout e pagamento protegidos.</span></div>
                            <div><strong>Garantia de 2 anos</strong><a href="/garantia.html">Ver garantia</a></div>
                            <div><strong>Troca conforme política</strong><a href="/politica-troca.html">Ver política</a></div>
                            <div><strong>Atendimento</strong><a data-store-whatsapp-link target="_blank" rel="noopener">WhatsApp VJ</a></div>
                            <div><strong>Dúvidas frequentes</strong><a href="/faq.html">Abrir FAQ</a></div>
                        </div>
                    </div>
                </div>
            `;

            if (typeof applyInputMasks === 'function') {
                applyInputMasks();
            }
            if (window.__vjStoreConfig && window.applyStoreConfig) {
                window.applyStoreConfig(window.__vjStoreConfig);
            } else if (window.refreshPublicStoreConfig) {
                await window.refreshPublicStoreConfig();
            }
        }

        function handleCartShippingCepKey(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                calculateCartShipping();
            }
        }

        async function calculateCartShipping() {
            const input = document.getElementById('cart-shipping-cep');
            const cepDigits = cartDigitsOnly(input?.value);
            if (cepDigits.length !== 8) {
                cartShippingError = 'Informe um CEP valido com 8 digitos.';
                Cart.clearShippingQuote();
                await renderCart({ refreshPricing: false });
                document.getElementById('cart-shipping-cep')?.focus();
                return;
            }

            cartShippingLoading = true;
            cartShippingError = '';
            await renderCart({ refreshPricing: false });

            const result = await API.calculateShipping(Cart.getSubtotal(), cepDigits, Cart.items);
            cartShippingLoading = false;

            if (!result.success) {
                cartShippingError = result.error || 'Nao foi possivel calcular o frete para este CEP.';
                Cart.clearShippingQuote({ keepZip: true });
                Cart.pricing.shippingZipCode = cepDigits;
                Cart.savePricing();
                await renderCart({ refreshPricing: false });
                return;
            }

            const options = Array.isArray(result.data.options) && result.data.options.length
                ? result.data.options
                : (result.data.selected_option ? [result.data.selected_option] : []);
            const previousSelectedId = Cart.pricing.shippingOption?.id || '';
            Cart.setShippingQuote(cepDigits, options, previousSelectedId);
            const coupon = await Cart.refreshCoupon(Cart.getSubtotal());
            Cart.pricing.discount = coupon.discount;
            Cart.pricing.discountCode = coupon.code;
            Cart.pricing.discountPercent = coupon.percent;
            Cart.savePricing();
            await renderCart({ refreshPricing: false });
        }

        async function selectCartShippingOption(optionId) {
            if (Cart.selectShippingOption(optionId)) {
                cartShippingError = '';
                await renderCart({ refreshPricing: false });
            }
        }

        async function clearCartShipping() {
            cartShippingError = '';
            Cart.clearShippingQuote();
            await renderCart({ refreshPricing: false });
            document.getElementById('cart-shipping-cep')?.focus();
        }

        function goToCheckoutFromCart(event) {
            if (Cart.pricing.shippingOption) return;
            event.preventDefault();
            showToast('Informe o CEP e selecione uma opção de frete para continuar para o checkout seguro.', 'error', 'Frete pendente');
            document.getElementById('cart-shipping-cep')?.focus();
        }

        async function updateItemQty(id, qty) { Cart.updateQuantity(id, qty); await renderCart(); }
        async function removeItem(id) { Cart.remove(id); await renderCart(); showToast('Item removido do carrinho', 'info'); }
        function clearCartConfirm() {
            if (confirm('Deseja realmente limpar o carrinho?')) {
                Cart.clear();
                renderCart();
                showToast('Carrinho limpo', 'info');
            }
        }

        async function applyCoupon() {
            const input = document.getElementById('coupon-input');
            const code = input.value.trim().toUpperCase();

            if (code === '') {
                localStorage.removeItem('vj_coupon');
                localStorage.removeItem('vj_coupon_percent');
                await renderCart();
                return;
            }

            const result = await API.validateCoupon(code);
            if (result.success && result.data.valid) {
                localStorage.setItem('vj_coupon', result.data.code);
                localStorage.setItem('vj_coupon_percent', String(result.data.discount_percent || 0));
                showToast(result.data.message || 'Cupom aplicado ao resumo do pedido.', 'success', 'Cupom aplicado');
                await renderCart();
                return;
            }

            localStorage.removeItem('vj_coupon');
            localStorage.removeItem('vj_coupon_percent');
            showToast(result.error || result.data?.message || 'Confira o código e tente novamente.', 'error', 'Cupom não aplicado');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadProductsFromAPI();
            Cart.syncProductData();
            await renderCart();
        });    </script>
</body>

</html>
