<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - VJ Semijoias</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/jpeg" href="images/logo.png">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-logo">
            <img src="images/logo.png" alt="VJ Semijoias" class="auth-logo-img">
            <div class="auth-logo-text">VJ</div>
            <div class="auth-logo-tagline">SEMIJOIAS</div>
        </div>
        
        <h2>Bem-vinda de volta</h2>
        <p>Entre na sua conta para continuar</p>
        
        <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>E-mail <span class="required">*</span></label>
                <input type="email" name="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha <span class="required">*</span></label>
                <input type="password" name="password" required placeholder="••••••">
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.5rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="checkbox"> Lembrar-me
                </label>
                <button type="button" onclick="handlePasswordResetRequest(event)" style="color: var(--gold-dark); font-size: 0.9rem; background: transparent; border: 0; padding: 0; cursor: pointer;">Esqueci a senha</button>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>
        
        <div class="auth-divider"><span>ou</span></div>
        
        <div style="display: flex; flex-direction: column; gap: 0.8rem; margin-top: 1.5rem;">
            <button onclick="alert('Login com Google em breve!')" style="padding: 0.85rem; border: 2px solid var(--gray-light); border-radius: 10px; font-size: 0.95rem; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 0.5rem; background: white;">
                <span style="color: #4285f4; font-weight: bold;">G</span> Continuar com Google
            </button>
            <button onclick="alert('Login com Facebook em breve!')" style="padding: 0.85rem; border: 2px solid var(--gray-light); border-radius: 10px; font-size: 0.95rem; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 0.5rem; background: white;">
                <span style="color: #1877f2; font-weight: bold;">f</span> Continuar com Facebook
            </button>
        </div>
        
        <div class="auth-footer">
            Não tem uma conta? <a href="/cadastro">Cadastre-se</a>
        </div>
        
        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="/" style="color: var(--gray); font-size: 0.9rem;">← Voltar para a loja</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/store-config.js"></script>
    <script src="js/products.js"></script>
    <script src="js/public-layout.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
    <script src="js/offline.js"></script>
    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const email = formData.get('email');
            const password = formData.get('password');
            
            const result = await Auth.login(email, password);
            
            if (result.success) {
                showToast(result.message, 'success');
                setTimeout(() => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect') || '/';
                    window.location.href = redirect;
                }, 1000);
            } else {
                showToast(result.message, 'error', 'Erro no login');
            }
        }

        async function handlePasswordResetRequest(event) {
            event.preventDefault();
            const email = window.prompt('Informe seu e-mail de cadastro:');
            if (!email) return;
            const result = await API.requestPasswordReset(email.trim());
            showToast(
                result.data?.message || result.error || 'Se o e-mail existir, enviaremos instrucoes.',
                result.success ? 'success' : 'error'
            );
        }

        async function handlePasswordResetToken() {
            const urlParams = new URLSearchParams(window.location.search);
            const resetToken = urlParams.get('reset_token');
            if (!resetToken) return false;
            const password = window.prompt('Digite sua nova senha com pelo menos 6 caracteres:');
            if (!password) return true;
            const result = await API.confirmPasswordReset(resetToken, password);
            if (!result.success) {
                showToast(result.error || 'Link invalido ou expirado', 'error');
                return true;
            }
            Auth.user = result.data.user;
            localStorage.setItem('vj_user', JSON.stringify(Auth.user));
            Auth.updateUI();
            showToast('Senha atualizada com sucesso!', 'success');
            setTimeout(() => window.location.href = '/', 1000);
            return true;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (await handlePasswordResetToken()) return;
            if (Auth.isLoggedIn()) {
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect') || '/';
                showToast('Você já está logada!', 'info');
                setTimeout(() => window.location.href = redirect, 800);
            }
        });
    </script>
</body>
</html>
