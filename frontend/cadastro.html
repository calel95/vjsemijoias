<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - VJ Semijoias</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/jpeg" href="images/logo.png">
    <script src="js/seo.js" defer></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-logo">
            <img src="images/logo.png" alt="VJ Semijoias" class="auth-logo-img">
            <div class="auth-logo-text">VJ</div>
            <div class="auth-logo-tagline">SEMIJOIAS</div>
        </div>
        
        <h2>Criar Conta</h2>
        <p>Cadastre-se para receber novidades e beneficios ativos da loja</p>
        
        <form class="auth-form" id="register-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Nome Completo <span class="required">*</span></label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>E-mail <span class="required">*</span></label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>CPF <span class="required">*</span></label>
                <input type="text" name="cpf" data-mask="cpf" required placeholder="000.000.000-00">
            </div>
            <div class="form-group">
                <label>Telefone</label>
                <input type="text" name="phone" data-mask="phone" placeholder="(00) 00000-0000">
            </div>
            <div class="form-group">
                <label>Data de Nascimento</label>
                <input type="date" name="birthdate">
            </div>
            <div class="form-group">
                <label>Senha <span class="required">*</span></label>
                <input type="password" name="password" id="password" required placeholder="Mínimo 6 caracteres" oninput="checkPassword()">
                <ul class="password-requirements" id="password-req">
                    <li id="req-length">Mínimo 6 caracteres</li>
                    <li id="req-letter">Pelo menos uma letra</li>
                    <li id="req-number">Pelo menos um número</li>
                </ul>
            </div>
            <div class="form-group">
                <label>Confirmar Senha <span class="required">*</span></label>
                <input type="password" name="passwordConfirm" required>
            </div>
            
            <div style="margin: 1rem 0;">
                <label style="display: flex; align-items: start; gap: 0.5rem; cursor: pointer; font-size: 0.9rem; color: var(--gray-dark);">
                    <input type="checkbox" name="newsletter" checked style="margin-top: 0.2rem;">
                    <span>Quero receber novidades e promoções por e-mail</span>
                </label>
            </div>
            
            <div style="margin: 1rem 0;">
                <label style="display: flex; align-items: start; gap: 0.5rem; cursor: pointer; font-size: 0.9rem; color: var(--gray-dark);">
                    <input type="checkbox" name="terms" required style="margin-top: 0.2rem;">
                    <span>Li e aceito os <a href="/termos-uso.html" style="color: var(--gold-dark);">Termos de Uso</a> e a <a href="/politica-privacidade.html" style="color: var(--gold-dark);">Política de Privacidade</a></span>
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Criar Conta</button>
        </form>
        
        <div class="auth-footer">
            Já tem uma conta? <a href="/login">Faça login</a>
        </div>
        
        <div style="text-align: center; margin-top: 1rem;">
            <a href="/" style="color: var(--gray); font-size: 0.9rem;">← Voltar para a loja</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/store-config.js"></script>
    <script src="js/products.js"></script>
    <script src="js/public-layout.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
    <script src="js/offline.js"></script>
    <script>
        function checkPassword() {
            const password = document.getElementById('password').value;
            const lengthReq = document.getElementById('req-length');
            const letterReq = document.getElementById('req-letter');
            const numberReq = document.getElementById('req-number');
            
            if (password.length >= 6) { lengthReq.classList.add('valid'); lengthReq.classList.remove('invalid'); }
            else { lengthReq.classList.remove('valid'); lengthReq.classList.add('invalid'); }
            
            if (/[a-zA-Z]/.test(password)) { letterReq.classList.add('valid'); letterReq.classList.remove('invalid'); }
            else { letterReq.classList.remove('valid'); letterReq.classList.add('invalid'); }
            
            if (/\d/.test(password)) { numberReq.classList.add('valid'); numberReq.classList.remove('invalid'); }
            else { numberReq.classList.remove('valid'); numberReq.classList.add('invalid'); }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData);
            
            if (data.password !== data.passwordConfirm) {
                showToast('As senhas não coincidem', 'error', 'Erro no cadastro');
                return;
            }
            
            if (!data.terms) {
                showToast('Você precisa aceitar os termos de uso', 'error', 'Erro no cadastro');
                return;
            }
            
            const result = await Auth.register(data);
            
            if (result.success) {
                const config = await API.getStoreConfig();
                const coupon = config.success ? config.data.coupon : null;
                if (coupon?.enabled && coupon.code) {
                    localStorage.setItem('vj_coupon', coupon.code);
                    localStorage.setItem('vj_coupon_percent', String(coupon.discount_percent || 0));
                    showToast(
                        `${result.message} Voce ganhou ${coupon.discount_percent}% de desconto!`,
                        'success',
                        'Bem-vinda!'
                    );
                } else {
                    showToast(result.message, 'success', 'Bem-vinda!');
                }
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            } else {
                showToast(result.message, 'error', 'Erro no cadastro');
            }
        }
    </script>
</body>
</html>
